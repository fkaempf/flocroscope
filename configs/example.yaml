# virtual.reality - Full configuration example
#
# All values shown are the built-in defaults from the dataclass schemas
# in src/virtual_reality/config/schema.py.  Override only the fields
# you need; unset fields fall back to these defaults.
#
# Usage:
#   config = load_config("configs/example.yaml")

# ---------------------------------------------------------------------------
# Arena geometry
# ---------------------------------------------------------------------------
arena:
  radius_mm: 40.0  # Circular arena radius in millimeters

# ---------------------------------------------------------------------------
# 3D fly model loading and scaling
# ---------------------------------------------------------------------------
fly_model:
  model_path: ""              # Path to the .glb model file (platform-resolved if empty)
  phys_length_mm: 3.0         # Target physical length of the fly in mm (longest mesh dimension)
  base_scale: 1.0             # Extra multiplier applied after physical scaling
  yaw_offset_deg: 0.0         # Degrees to rotate the model so its nose faces the motion direction

# ---------------------------------------------------------------------------
# Observer camera position and projection
# ---------------------------------------------------------------------------
camera:
  x_mm: 0.0                        # Camera X position in mm (arena center = 0)
  y_mm: -40.0                      # Camera Y position in mm (default: edge of arena)
  height_mm: 0.89                   # Camera height above the arena plane in mm
  speed_mm_s: 20.0                  # Camera translation speed in mm/s
  turn_deg_s: 200.0                 # Camera rotation speed in degrees/s
  stand_turn_mult: 1.5              # Multiplier on turn speed when camera is stationary
  z_speed_mm_s: 20.0                # Camera vertical speed in mm/s
  fov_x_deg: 200.0                  # Horizontal field of view in degrees
  fov_y_deg: 60.0                   # Vertical field of view in degrees
  projection: "equirect"            # Projection mode: "perspective", "equirect", or "equidistant"
  allow_ultrawide: true             # Allow FOV near or beyond 180 degrees
  flip_model_for_ultrawide: true    # Flip mesh about X for spherical projection to keep fly upright

# ---------------------------------------------------------------------------
# Fly movement parameters
# ---------------------------------------------------------------------------
movement:
  speed_mm_s: 20.0                 # Forward speed in mm/s
  back_mm_s: 12.8                  # Backward speed in mm/s
  turn_deg_s: 200.0                # Turn rate in degrees/s
  stand_turn_mult: 1.5             # Multiplier on turn speed when standing still
  walk_turn_noise_deg_rms: 20.0    # Per-frame heading noise (RMS degrees) during forward movement
  walk_trans_noise_mm_rms: 1.0     # Per-frame lateral noise (RMS mm) during forward movement
  start_x: 0.0                    # Initial fly X position in mm
  start_y: -20.0                  # Initial fly Y position in mm
  start_heading_deg: 0.0          # Initial fly heading in degrees

# ---------------------------------------------------------------------------
# Autonomous fly state machine
# ---------------------------------------------------------------------------
autonomous:
  enabled: true            # Whether autonomous mode is active (false = keyboard WASD control)
  mean_run_dur: 1.0        # Mean duration of the running state in seconds
  mean_pause_dur: 0.7      # Mean duration of the paused state in seconds
  turn_std_deg: 80.0       # Standard deviation of random turn during pause (degrees)
  edge_turn_deg: 120.0     # Stronger turn applied near the arena boundary (degrees)
  edge_thresh_frac: 0.8    # Fraction of arena radius at which edge avoidance kicks in

# ---------------------------------------------------------------------------
# Phong lighting for 3D rendering (four directional lights: N, E, S, W)
# ---------------------------------------------------------------------------
lighting:
  ambient: 0.6                        # Base ambient light multiplier
  intensities: [2.0, 2.0, 2.0, 2.0]  # Strengths for N, E, S, W directional lights
  elevation_deg: 65.0                 # Light elevation angle above horizon in degrees
  max_gain: 4.0                       # Maximum allowed total light gain (clamp)

# ---------------------------------------------------------------------------
# 2D overhead minimap visualization
# ---------------------------------------------------------------------------
minimap:
  enabled: true              # Whether to show the minimap overlay
  width: 420                 # Minimap width in pixels
  height: 420                # Minimap height in pixels
  pad: 24                    # Padding from screen edge in pixels
  trail_secs: 5.0            # Duration of position trail in seconds
  trail_color: [255, 200, 0] # RGB color tuple for the trail
  trail_thick: 2             # Trail line thickness in pixels
  hz: 60                     # Minimap refresh rate in Hz

# ---------------------------------------------------------------------------
# Projector warp map paths
# ---------------------------------------------------------------------------
warp:
  mapx_path: ""  # Path to mapx.npy (projector warp X); empty = no warp correction
  mapy_path: ""  # Path to mapy.npy (projector warp Y); empty = no warp correction

# ---------------------------------------------------------------------------
# Display and window settings
# ---------------------------------------------------------------------------
display:
  bg_color: [255, 255, 255]  # Background color as RGB (0-255)
  target_fps: 60             # Target frames per second
  borderless: true           # Whether to create a borderless window
  monitor: "right"           # Which monitor to use: "right" or "left"

# ---------------------------------------------------------------------------
# Physical-to-pixel scaling parameters
# ---------------------------------------------------------------------------
scaling:
  screen_distance_mm: 60.0        # Fixed physical eye-to-screen distance in mm
  apparent_distance_mm: null       # Override for apparent distance; null = use live camera-fly separation
  dist_scale_smooth_hz: 8.0       # Smoothing rate for scale transitions (Hz)
  min_cam_fly_dist_mm: 1.5        # Minimum allowed camera-fly distance in mm

# ---------------------------------------------------------------------------
# Calibration pipeline settings
# ---------------------------------------------------------------------------
calibration:
  camera_type: "alvium"        # Camera driver: "alvium" or "rotpy"
  proj_w: 1280                 # Projector width in pixels
  proj_h: 800                  # Projector height in pixels
  mode: "sine_hybrid"          # Capture mode: "gray" or "sine_hybrid"
  periods_x: 128               # Number of sine periods along X axis
  periods_y: 96                # Number of sine periods along Y axis
  nphase: 15                   # Number of phase-shift steps
  avg_per: 5                   # Number of frames to average per pattern
  exposure_ms: 10.0            # Camera exposure time in milliseconds
  gain_db: 0.0                 # Camera gain in decibels

# ---------------------------------------------------------------------------
# Inter-process communication settings
# ---------------------------------------------------------------------------
comms:
  enabled: false                  # Master switch for the comms subsystem
  fictrac_host: "localhost"       # FicTrac TCP host address
  fictrac_port: 2000              # FicTrac socket port (0 = disabled)
  fictrac_ball_radius_mm: 4.5    # Physical ball radius for rad-to-mm conversion
  scanimage_port: 5000            # ScanImage TCP server port (0 = disabled)
  led_port: 5001                  # Optogenetics LED ZMQ PUB port (0 = disabled)
  presenter_host: "localhost"     # Fly presenter controller host
  presenter_port: 5002            # Fly presenter ZMQ REQ port (0 = disabled)
  log_messages: false             # Whether to log individual messages at DEBUG level

# ---------------------------------------------------------------------------
# Experiment session settings
# ---------------------------------------------------------------------------
session:
  output_dir: "data/sessions"    # Directory for session data output
  auto_save: true                # Whether to auto-save session events
  log_fictrac: true              # Whether to log raw FicTrac data
  log_stimulus: true             # Whether to log stimulus state each frame
  log_interval_ms: 16.67         # Minimum interval between log entries in ms (~60 Hz)
